<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ I Love You</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000; /* Latar belakang gelap agar warna memancar */
    }
    canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="heart"></canvas>
  <script>
    window.requestAnimationFrame =
      window.__requestAnimationFrame ||
      window.requestAnimationFrame ||
      window.webkitRequestAnimationFrame ||
      window.mozRequestAnimationFrame ||
      window.oRequestAnimationFrame ||
      window.msRequestAnimationFrame ||
      (function () {
        return function (callback, element) {
          var lastTime = element.__lastTime || 0;
          var currTime = Date.now();
          var timeToCall = Math.max(1, 33 - (currTime - lastTime));
          window.setTimeout(callback, timeToCall);
          element.__lastTime = currTime + timeToCall;
        };
      })();

    window.isDevice = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(
      (navigator.userAgent || navigator.vendor || window.opera).toLowerCase()
    );

    var loaded = false;

    var init = function () {
      if (loaded) return;
      loaded = true;
      var mobile = window.isDevice;
      var canvas = document.getElementById("heart");
      var ctx = canvas.getContext("2d");
      
      var width = (canvas.width = innerWidth);
      var height = (canvas.height = innerHeight);
      var rand = Math.random;

      // Skala responsif
      var ratio = Math.min(width, height) / 800;
      if (mobile) ratio *= 1.4; 

      ctx.fillStyle = "rgba(0,0,0,1)";
      ctx.fillRect(0, 0, width, height);

      // Fungsi teks dengan efek Fade-in dan Glow
      var drawText = function (pulseScale, opacity) {
        if (opacity <= 0.01) return; // Jangan gambar jika belum waktunya
        ctx.save();
        var fontSize = 60 * ratio * (0.85 + pulseScale * 0.15); 
        ctx.font = "bold " + fontSize + "px 'Arial', sans-serif";
        
        // Warna teks terpengaruh oleh opacity saat fade-in
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.95})`; 
        
        ctx.shadowColor = `rgba(255, 51, 102, ${opacity})`;
        ctx.shadowBlur = 20;
        
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("I LOVE YOU", width / 2, height / 2.2); 
        ctx.restore();
      };

      var heartPosition = function (rad) {
        return [
          Math.pow(Math.sin(rad), 3),
          -(
            15 * Math.cos(rad) -
            5 * Math.cos(2 * rad) -
            2 * Math.cos(3 * rad) -
            Math.cos(4 * rad)
          ),
        ];
      };

      var scaleAndTranslate = function (pos, sx, sy, dx, dy) {
        return [dx + pos[0] * sx, dy + pos[1] * sy];
      };

      window.addEventListener("resize", function () {
        width = canvas.width = innerWidth;
        height = canvas.height = innerHeight;
        ratio = Math.min(width, height) / 800;
        if (mobile) ratio *= 1.4;
        ctx.fillStyle = "rgba(0,0,0,1)";
        ctx.fillRect(0, 0, width, height);
      });

      // Sedikit ditambah partikelnya agar saat meledak lebih padat
      var traceCount = mobile ? 25 : 50;
      var pointsOrigin = [];
      var dr = mobile ? 0.15 : 0.08;
      for (var i = 0; i < Math.PI * 2; i += dr)
        pointsOrigin.push(scaleAndTranslate(heartPosition(i), 310, 19, 0, 0)); 
      for (var i = 0; i < Math.PI * 2; i += dr)
        pointsOrigin.push(scaleAndTranslate(heartPosition(i), 250, 15, 0, 0)); 
      for (var i = 0; i < Math.PI * 2; i += dr)
        pointsOrigin.push(scaleAndTranslate(heartPosition(i), 190, 11, 0, 0)); 

      var heartPointsCount = pointsOrigin.length;
      var targetPoints = [];

      var pulse = function (kx, ky) {
        for (var i = 0; i < pointsOrigin.length; i++) {
          targetPoints[i] = [
            kx * pointsOrigin[i][0] * ratio + width / 2,
            ky * pointsOrigin[i][1] * ratio + height / 2.2,
          ];
        }
      };

      var e = [];
      var colors = [
        "rgba(255, 51, 102, 0.8)", 
        "rgba(255, 0, 51, 0.8)",    
        "rgba(255, 102, 153, 0.8)", 
        "rgba(255, 204, 204, 0.8)"  
      ];

      // Mulai semua partikel dari titik TENGAN untuk efek ledakan
      for (var i = 0; i < heartPointsCount; i++) {
        var startX = width / 2;
        var startY = height / 2.2;
        e[i] = {
          vx: 0,
          vy: 0,
          R: 2,
          speed: rand() + 5,
          q: ~~(rand() * heartPointsCount),
          D: 2 * (i % 2) - 1,
          force: 0.15 * rand() + 0.7, // Dibuat lebih halus
          f: colors[~~(rand() * colors.length)],
          trace: Array.from({ length: traceCount }, () => ({ x: startX, y: startY })),
          
          // Variabel khusus untuk animasi Intro (Galaksi)
          introAngle: rand() * Math.PI * 2,
          introRadius: (rand() * rand() * 350 + 20) * ratio, 
          introSpeed: (rand() > 0.5 ? 1 : -1) * (rand() * 0.03 + 0.01)
        };
      }

      var config = { traceK: 0.4, timeDelta: 0.6 };
      
      // Timer Animasi
      var animFrame = 0;
      var phase1 = 120; // Durasi Ledakan Galaksi
      var phase2 = 220; // Durasi Melayang
      var phase3 = 350; // Durasi Penyatuan Hati
      
      // Waktu dibekukan di puncak ukuran agar hati terbuka penuh saat partikel datang
      var time = Math.PI; 

      var loop = function () {
        animFrame++;
        
        var n = -Math.cos(time);
        var pulseScale = (1 + n) * 0.5;
        pulse(pulseScale, pulseScale);
        
        // Detak jantung hanya dimulai SETELAH animasi hati selesai merangkai
        if (animFrame > phase3) {
            time += (Math.sin(time) < 0 ? 9 : n > 0.8 ? 0.2 : 1) * config.timeDelta;
        }

        ctx.fillStyle = "rgba(0,0,0,.1)";
        ctx.fillRect(0, 0, width, height);

        // Efek Flash Terang di awal animasi (Cahaya Supernova)
        if (animFrame < 15) {
            ctx.fillStyle = `rgba(255, 255, 255, ${1 - animFrame / 15})`;
            ctx.fillRect(0, 0, width, height);
        }

        // Teks perlahan muncul di akhir fase 3
        var textOpacity = 0;
        if (animFrame > phase2 && animFrame <= phase3) {
            textOpacity = (animFrame - phase2) / (phase3 - phase2);
        } else if (animFrame > phase3) {
            textOpacity = 1;
        }

        for (var i = e.length; i--; ) {
          var u = e[i];
          var q;

          if (animFrame < phase1) {
              // FASE 1: Meledak & Berputar (Efek Galaksi)
              var progress = animFrame / phase1;
              var ease = 1 - Math.pow(1 - progress, 3); // Melambat di ujung
              u.introAngle += u.introSpeed;
              var currentRadius = u.introRadius * ease;
              q = [
                  width / 2 + Math.cos(u.introAngle) * currentRadius,
                  height / 2.2 + Math.sin(u.introAngle) * currentRadius
              ];
          } else if (animFrame < phase2) {
              // FASE 2: Melayang bebas
              u.introAngle += u.introSpeed * 0.5;
              var currentRadius = u.introRadius + Math.sin(animFrame * 0.05 + i) * 15 * ratio; // Berombak
              q = [
                  width / 2 + Math.cos(u.introAngle) * currentRadius,
                  height / 2.2 + Math.sin(u.introAngle) * currentRadius
              ];
          } else if (animFrame < phase3) {
              // FASE 3: Partikel ditarik bersatu membentuk Hati
              var progress = (animFrame - phase2) / (phase3 - phase2);
              var ease = progress * progress * (3 - 2 * progress); // Gerakan smooth step
              
              u.introAngle += u.introSpeed * 0.2; 
              var currentRadius = u.introRadius;
              var vortexQ = [
                  width / 2 + Math.cos(u.introAngle) * currentRadius,
                  height / 2.2 + Math.sin(u.introAngle) * currentRadius
              ];
              var heartQ = targetPoints[u.q];
              
              // Menggabungkan koordinat melayang dan koordinat hati sesungguhnya
              q = [
                  vortexQ[0] + (heartQ[0] - vortexQ[0]) * ease,
                  vortexQ[1] + (heartQ[1] - vortexQ[1]) * ease
              ];
          } else {
              // FASE 4: Hati normal berdetak mengejar target
              q = targetPoints[u.q];
          }

          var dx = u.trace[0].x - q[0];
          var dy = u.trace[0].y - q[1];
          var length = Math.sqrt(dx * dx + dy * dy);

          // Pergantian posisi target sesekali hanya dilakukan jika hati sudah jadi
          if (animFrame > phase3) {
              if (length < 10) {
                if (rand() > 0.95) {
                  u.q = ~~(rand() * heartPointsCount);
                } else {
                  if (rand() > 0.99) u.D *= -1;
                  u.q = (u.q + u.D) % heartPointsCount;
                  if (u.q < 0) u.q += heartPointsCount;
                }
              }
          }

          u.vx += (-dx / length) * u.speed;
          u.vy += (-dy / length) * u.speed;
          u.trace[0].x += u.vx;
          u.trace[0].y += u.vy;
          u.vx *= u.force;
          u.vy *= u.force;

          for (var k = 0; k < u.trace.length - 1; k++) {
            var T = u.trace[k];
            var N = u.trace[k + 1];
            N.x -= config.traceK * (N.x - T.x);
            N.y -= config.traceK * (N.y - T.y);
          }

          ctx.fillStyle = u.f;
          u.trace.forEach((t) => ctx.fillRect(t.x, t.y, 1.5, 1.5));
        }

        drawText(pulseScale, textOpacity);
        window.requestAnimationFrame(loop, canvas);
      };

      loop();
    };

    var s = document.readyState;
    if (s === "complete" || s === "loaded" || s === "interactive") init();
    else document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
