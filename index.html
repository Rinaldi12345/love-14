<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Special For You</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    canvas {
      position: absolute;
      left: 0;
      top: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="heart"></canvas>
  <script>
    window.requestAnimationFrame =
      window.__requestAnimationFrame ||
      window.requestAnimationFrame ||
      window.webkitRequestAnimationFrame ||
      window.mozRequestAnimationFrame ||
      window.oRequestAnimationFrame ||
      window.msRequestAnimationFrame ||
      (function () {
        return function (callback, element) {
          var lastTime = element.__lastTime || 0;
          var currTime = Date.now();
          var timeToCall = Math.max(1, 33 - (currTime - lastTime));
          window.setTimeout(callback, timeToCall);
          element.__lastTime = currTime + timeToCall;
        };
      })();

    window.isDevice = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(
      (navigator.userAgent || navigator.vendor || window.opera).toLowerCase()
    );

    var loaded = false;

    var init = function () {
      if (loaded) return;
      loaded = true;
      var mobile = window.isDevice;
      var canvas = document.getElementById("heart");
      var ctx = canvas.getContext("2d");
      
      var width = (canvas.width = innerWidth);
      var height = (canvas.height = innerHeight);
      var rand = Math.random;

      var ratio = Math.min(width, height) / 800;
      if (mobile) ratio *= 1.4; 

      ctx.fillStyle = "rgba(0,0,0,1)";
      ctx.fillRect(0, 0, width, height);

      // --- BAGIAN MENGUBAH TEKS ---
      var drawText = function (pulseScale, opacity) {
        if (opacity <= 0.01) return;
        ctx.save();
        // Ukuran font disesuaikan ke 52 agar pas untuk HP saat teks bertambah panjang
        var fontSize = 52 * ratio * (0.88 + pulseScale * 0.12); 
        ctx.font = "bold " + fontSize + "px 'Arial', sans-serif";
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity * 0.95})`; 
        
        ctx.shadowColor = `rgba(255, 30, 90, ${opacity})`;
        ctx.shadowBlur = 25;
        
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        
        // Teks sudah diubah di bawah ini:
        ctx.fillText("I LOVE YOU SAYANG", width / 2, height / 2.2); 
        ctx.restore();
      };
      // ----------------------------

      var heartPosition = function (rad) {
        return [
          Math.pow(Math.sin(rad), 3),
          -(
            15 * Math.cos(rad) -
            5 * Math.cos(2 * rad) -
            2 * Math.cos(3 * rad) -
            Math.cos(4 * rad)
          ),
        ];
      };

      var scaleAndTranslate = function (pos, sx, sy, dx, dy) {
        return [dx + pos[0] * sx, dy + pos[1] * sy];
      };

      window.addEventListener("resize", function () {
        width = canvas.width = innerWidth;
        height = canvas.height = innerHeight;
        ratio = Math.min(width, height) / 800;
        if (mobile) ratio *= 1.4;
        ctx.fillStyle = "rgba(0,0,0,1)";
        ctx.fillRect(0, 0, width, height);
      });

      var traceCount = mobile ? 25 : 55;
      var pointsOrigin = [];
      var dr = mobile ? 0.12 : 0.06; 
      for (var i = 0; i < Math.PI * 2; i += dr)
        pointsOrigin.push(scaleAndTranslate(heartPosition(i), 310, 19, 0, 0)); 
      for (var i = 0; i < Math.PI * 2; i += dr)
        pointsOrigin.push(scaleAndTranslate(heartPosition(i), 250, 15, 0, 0)); 
      for (var i = 0; i < Math.PI * 2; i += dr)
        pointsOrigin.push(scaleAndTranslate(heartPosition(i), 190, 11, 0, 0)); 

      var heartPointsCount = pointsOrigin.length;
      var targetPoints = [];

      var pulse = function (kx, ky) {
        for (var i = 0; i < pointsOrigin.length; i++) {
          targetPoints[i] = [
            kx * pointsOrigin[i][0] * ratio + width / 2,
            ky * pointsOrigin[i][1] * ratio + height / 2.2,
          ];
        }
      };

      var e = [];
      var colors = [
        "rgba(255, 40, 90, 0.85)",  
        "rgba(255, 0, 55, 0.85)",    
        "rgba(255, 110, 160, 0.85)", 
        "rgba(255, 220, 220, 0.9)"   
      ];

      for (var i = 0; i < heartPointsCount; i++) {
        var sX = rand() * width;
        var sY = height + rand() * 250; 
        
        e[i] = {
          vx: 0,
          vy: 0,
          R: 2,
          speed: rand() * 2 + 4,
          q: ~~(rand() * heartPointsCount),
          D: 2 * (i % 2) - 1,
          force: 0.12 * rand() + 0.75, 
          f: colors[~~(rand() * colors.length)],
          trace: Array.from({ length: traceCount }, () => ({ x: sX, y: sY })),
          
          startX: sX,
          startY: sY,
          
          introAngle: rand() * Math.PI * 2,
          introRadius: (rand() * rand() * 380 + 20) * ratio, 
          introSpeed: (rand() > 0.4 ? 1 : -1) * (rand() * 0.02 + 0.008),
          sparkle: rand() > 0.82
        };
      }

      var animFrame = 0;
      var phase0 = 150; 
      var phase1 = 370; 
      var phase2 = 530; 
      var phase3 = 690; 
      
      var time = Math.PI; 

      var loop = function () {
        animFrame++;
        
        var pulseScale = 1.0;
        if (animFrame > phase3) {
            time += 0.022; 
            var n = -Math.cos(time);
            pulseScale = 0.88 + (1 + n) * 0.06; 
        }
        
        pulse(pulseScale, pulseScale);

        ctx.fillStyle = "rgba(0,0,0,.07)";
        ctx.fillRect(0, 0, width, height);

        if (animFrame > phase0 && animFrame < phase0 + 20) {
            var flashProgress = (animFrame - phase0) / 20;
            ctx.fillStyle = `rgba(255, 255, 255, ${0.4 * (1 - flashProgress)})`;
            ctx.fillRect(0, 0, width, height);
        }

        var textOpacity = 0;
        if (animFrame > phase2 && animFrame <= phase3) {
            textOpacity = (animFrame - phase2) / (phase3 - phase2);
        } else if (animFrame > phase3) {
            textOpacity = 1;
        }

        for (var i = e.length; i--; ) {
          var u = e[i];
          var q;

          if (animFrame < phase0) {
              var progress = animFrame / phase0;
              var ease = progress * progress * (3 - 2 * progress); 
              var targetX = width / 2;
              var targetY = height / 2.2;
              
              var waveX = Math.sin(animFrame * 0.04 + i) * 35 * (1 - progress) * ratio;
              q = [
                  u.startX + (targetX - u.startX) * ease + waveX,
                  u.startY + (targetY - u.startY) * ease
              ];
          } else if (animFrame < phase1) {
              var progress = (animFrame - phase0) / (phase1 - phase0);
              var ease = 1 - Math.pow(1 - progress, 4); 
              u.introAngle += u.introSpeed * (1 + (1 - progress) * 1.5);
              var currentRadius = u.introRadius * ease;
              q = [
                  width / 2 + Math.cos(u.introAngle) * currentRadius,
                  height / 2.2 + Math.sin(u.introAngle) * currentRadius
              ];
          } else if (animFrame < phase2) {
              u.introAngle += u.introSpeed * 0.3;
              var wave = Math.sin(animFrame * 0.03 + i * 0.1) * 20 * ratio;
              var currentRadius = u.introRadius + wave;
              q = [
                  width / 2 + Math.cos(u.introAngle) * currentRadius,
                  height / 2.2 + Math.sin(u.introAngle) * currentRadius
              ];
          } else if (animFrame < phase3) {
              var progress = (animFrame - phase2) / (phase3 - phase2);
              var ease = progress * progress * progress * (progress * (progress * 6 - 15) + 10); 
              
              u.introAngle += u.introSpeed * 0.1; 
              var currentRadius = u.introRadius;
              var vortexQ = [
                  width / 2 + Math.cos(u.introAngle) * currentRadius,
                  height / 2.2 + Math.sin(u.introAngle) * currentRadius
              ];
              var heartQ = targetPoints[u.q];
              
              q = [
                  vortexQ[0] + (heartQ[0] - vortexQ[0]) * ease,
                  vortexQ[1] + (heartQ[1] - vortexQ[1]) * ease
              ];
          } else {
              q = targetPoints[u.q];
          }

          var dx = u.trace[0].x - q[0];
          var dy = u.trace[0].y - q[1];
          var length = Math.sqrt(dx * dx + dy * dy);

          if (animFrame > phase3) {
              if (length < 10) {
                if (rand() > 0.95) {
                  u.q = ~~(rand() * heartPointsCount);
                } else {
                  if (rand() > 0.99) u.D *= -1;
                  u.q = (u.q + u.D) % heartPointsCount;
                  if (u.q < 0) u.q += heartPointsCount;
                }
              }
          }

          u.vx += (-dx / length) * u.speed;
          u.vy += (-dy / length) * u.speed;
          u.trace[0].x += u.vx;
          u.trace[0].y += u.vy;
          u.vx *= u.force;
          u.vy *= u.force;

          for (var k = 0; k < u.trace.length - 1; k++) {
            var T = u.trace[k];
            var N = u.trace[k + 1];
            N.x -= config.traceK * (N.x - T.x);
            N.y -= config.traceK * (N.y - T.y);
          }

          if (u.sparkle && animFrame < phase3 && rand() > 0.4) {
              ctx.fillStyle = "rgba(255, 255, 255, 0.95)"; 
          } else {
              ctx.fillStyle = u.f;
          }
          
          u.trace.forEach((t) => ctx.fillRect(t.x, t.y, 1.6, 1.6));
        }

        var textPulse = (animFrame > phase3) ? (pulseScale - 0.88) / 0.12 : 1.0;
        drawText(textPulse, textOpacity);
        
        window.requestAnimationFrame(loop, canvas);
      };

      loop();
    };

    var s = document.readyState;
    if (s === "complete" || s === "loaded" || s === "interactive") init();
    else document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
